<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GF - Admin Panel</title>
    <style>
        :root { --primary: #003399; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .bg-watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 15vw; font-weight: 900; color: rgba(0, 51, 153, 0.03); z-index: -1; pointer-events: none; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid var(--primary); }
        h1 { color: var(--primary); text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        table { width: 100%; border-collapse: collapse; margin-top: 30px; background: white; }
        th { background: var(--primary); color: white; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        .badge { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; background: #eef2f7; color: var(--primary); }
    </style>
</head>
<body>
    <div class="bg-watermark">GULSHAN FIRDOUS</div>
    <div class="container">
        <h1>Gulshan Firdous - Admin Dashboard</h1>
        <table>
            <thead>
                <tr>
                    <th>Employee Name</th>
                    <th>ID</th>
                    <th>Duty Hours</th>
                    <th>Work Done</th>
                    <th>Extra (Ijara)</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <script>
        function loadAdminData() {
            let tbody = document.getElementById('tableBody');
            tbody.innerHTML = "";
            for (let i = 0; i < localStorage.length; i++) {
                let user = JSON.parse(localStorage.getItem(localStorage.key(i)));
                if(user && user.name) {
                    tbody.innerHTML += `<tr>
                        <td><b>${user.name}</b></td>
                        <td><span class="badge">${user.id}</span></td>
                        <td>${user.dutyHours}h</td>
                        <td>${user.totalHours || 0}h</td>
                        <td style="color:blue; font-weight:bold;">${user.extraTime || 0}h</td>
                    </tr>`;
                }
            }
        }
        window.onload = loadAdminData;
    </script>
</body>
</html>
