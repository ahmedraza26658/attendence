<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <title>GF - Attendance</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .bg-logo { position: absolute; width: 400px; height: 400px; border: 40px solid rgba(0, 51, 153, 0.05); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 150px; color: rgba(0, 51, 153, 0.05); font-weight: bold; z-index: -1; }
        
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 380px; text-align: center; border-top: 8px solid #003399; }
        .timer-display { font-size: 48px; font-weight: bold; color: #333; margin: 20px 0; font-family: monospace; background: #f8f9fa; padding: 15px; border-radius: 10px; }
        
        .btn-in { background: #28a745; color: white; padding: 15px; width: 100%; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-bottom: 10px; font-weight: bold; }
        .btn-out { background: #dc3545; color: white; padding: 15px; width: 100%; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; }
        
        .report-box { background: #eef2f7; padding: 15px; border-radius: 10px; margin-top: 20px; text-align: left; color: #003399; font-size: 14px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; text-align: center; font-size: 16px; }
    </style>
</head>
<body>
    <div class="bg-logo">GF</div>
    <div class="container">
        <h2 style="color:#003399; margin-top:0;">Gulshan Firdous</h2>
        <input type="text" id="loginID" placeholder="Apni Employee ID likhein">
        
        <div class="timer-display" id="display">00:00:00</div>
        
        <button class="btn-in" onclick="startWork()">Check-In (Aamad)</button>
        <button class="btn-out" onclick="stopWork()">Check-Out (Rakhsat)</button>
        
        <div class="report-box">
            <b>Aaj ki Report:</b><br>
            Kaam ka Waqt: <span id="todayTime">0h</span><br>
            Ijara (Extra): <span id="extraTime">0h</span>
        </div>
    </div>

    <script>
        let startTime, timerInterval;
        function startWork() {
            let id = document.getElementById('loginID').value;
            if(!localStorage.getItem(id)) { alert("ID ghalat hai ya account nahi bana!"); return; }
            startTime = new Date();
            timerInterval = setInterval(() => {
                let diff = new Date(new Date() - startTime);
                document.getElementById('display').innerText = diff.getUTCHours().toString().padStart(2, '0') + ":" + diff.getUTCMinutes().toString().padStart(2, '0') + ":" + diff.getUTCSeconds().toString().padStart(2, '0');
            }, 1000);
        }
        function stopWork() {
            clearInterval(timerInterval);
            let id = document.getElementById('loginID').value;
            let userData = JSON.parse(localStorage.getItem(id));
            let totalHours = ((new Date() - startTime) / (1000 * 60 * 60)).toFixed(2);
            let extra = totalHours > userData.dutyHours ? (totalHours - userData.dutyHours).toFixed(2) : 0;
            document.getElementById('todayTime').innerText = totalHours + " Hours";
            document.getElementById('extraTime').innerText = extra + " Hours";
            userData.totalHours = totalHours; userData.extraTime = extra;
            localStorage.setItem(id, JSON.stringify(userData));
        }
    </script>
</body>
</html>
